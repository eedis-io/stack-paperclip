# Paperclip — Open-source orchestration platform for autonomous AI agent teams
# Gegenereerd door stack-create, bijgehouden in env-config.yaml

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: paperclip
    volumes:
      - paperclip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - paperclip_net

  paperclip-init:
    image: alpine
    command: chown -R 1000:1000 /paperclip
    volumes:
      - paperclip_data:/paperclip
    networks:
      - paperclip_net

  paperclip:
    image: ${IMAGE:-ghcr.io/paperclipai/paperclip:sha-eefe9f3}
    ports:
      - "${LOCAL_PORT:-3100}:3100"
    environment:
      DATABASE_URL: postgres://paperclip:${POSTGRES_PASSWORD}@db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      NODE_ENV: production
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL}
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: ${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}
      PAPERCLIP_HOME: /paperclip
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - paperclip_data:/paperclip
    depends_on:
      db:
        condition: service_healthy
      paperclip-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - paperclip_net

volumes:
  paperclip_data:
  paperclip_db_data:

networks:
  paperclip_net:
    driver: bridge
